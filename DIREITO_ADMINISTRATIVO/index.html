<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="theme-color" content="#07090f" />
  <title>MV Estudos — Direito Administrativo</title>

  <!-- Ícones -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet" />

  <!-- CSS Responsivo por dispositivo -->
  <link rel="stylesheet" href="./shared/css/desktop.css" media="screen and (min-width: 1025px)" />
  <link rel="stylesheet" href="./shared/css/tablet.css" media="screen and (min-width: 768px) and (max-width: 1024px)" />
  <link rel="stylesheet" href="./shared/css/mobile.css" media="screen and (max-width: 767px)" />

  <style>
    /* Cor de destaque personalizada por matéria */
    :root { --acc: #22c878; --acc-lt: #4ee896; --acc-glow: rgba(34,200,120,0.16); --acc-border: rgba(34,200,120,0.32); }
  </style>
</head>
<body>

    <div class="topbar-center">
      <span class="topbar-subject-name">Direito Administrativo</span>
    </div>

    <div class="topbar-right">
      <div class="progress-chip" id="top-prog">
        <span class="chip-dot"></span>
        <span class="chip-text">0 / 0 tópicos</span>
      </div>
      <button class="btn-icon" id="btn-theme" title="Alternar tema (T)" aria-label="Alternar tema">
        <span class="material-symbols-outlined" style="font-size:18px">light_mode</span>
      </button>
    </div>
  </header>

  <!-- ══ WORKSPACE ══════════════════════════════════════ -->
  <div class="workspace">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar" aria-label="Lista de tópicos">

      <div class="sidebar-head">
        <p class="sidebar-head-label">📚 Matéria</p>
        <h2 class="sidebar-head-title">Direito Administrativo</h2>
      </div>

      <div class="sidebar-search-wrap">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input
            id="search-input"
            type="search"
            placeholder="Buscar tópico..."
            autocomplete="off"
            aria-label="Buscar tópico"
          />
        </div>
      </div>

      <!-- Topics container -->
      <div class="sidebar-topics" id="sidebar-list" role="list" aria-label="Tópicos">
        <div class="no-results" style="padding:2rem 1rem;text-align:center;color:var(--txt3)">
          <span style="font-size:1.5rem;display:block;margin-bottom:.5rem">⏳</span>
          Carregando tópicos…
        </div>
      </div>

      <div class="sidebar-footer">
        <div class="prog-row">
          <span class="prog-label">✨ Progresso</span>
          <span class="prog-pct" id="prog-pct">0%</span>
        </div>
        <div class="prog-track">
          <div class="prog-fill" id="sidebar-prog-fill" style="width:0%"></div>
        </div>
      </div>

    </aside>

    <!-- MAIN -->
    <main class="main" id="main-content">

      <input type="radio" name="main-tab" id="tab-aprender" class="tab-input" checked />
      <input type="radio" name="main-tab" id="tab-progresso" class="tab-input" />

      <nav class="tabbar" role="tablist">
        <label for="tab-aprender" class="tab-label" role="tab">
          <span class="material-symbols-outlined" style="font-size:17px">menu_book</span>
          Aprender
        </label>
        <label for="tab-progresso" class="tab-label" role="tab">
          <span class="material-symbols-outlined" style="font-size:17px">analytics</span>
          Progresso
        </label>
      </nav>

      <div class="view-area" id="view-area" role="tabpanel">
        <div class="empty-state">
          <div class="empty-icon">🏛️</div>
          <p class="empty-title">Selecione um tópico para começar</p>
          <p class="empty-hint">← Use a barra lateral para navegar</p>
        </div>
      </div>

    </main>
  </div>

  <!-- Botão scroll -->
  <button class="scroll-btn" id="scroll-btn" style="display:none" aria-label="Rolar para baixo">
    <span class="material-symbols-outlined" style="font-size:18px">keyboard_arrow_down</span>
  </button>

  <!-- Mobile toggle -->
  <button class="mobile-toggle" id="mobile-toggle" aria-label="Abrir menu">
    <span class="material-symbols-outlined" style="font-size:22px">menu</span>
  </button>

  <!-- Overlay mobile -->
  <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

  <!-- ══ SCRIPTS ══════════════════════════════════════════ -->
  <!-- 1. Dados da matéria -->
  <script src="data/data_direito-administrativo.js"></script>
  <!-- 2. App compartilhado -->
  <script src="./shared/js/app.js"></script>
</body>
</html>
